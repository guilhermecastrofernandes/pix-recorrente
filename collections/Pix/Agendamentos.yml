info:
  name: Agendamentos
  type: http
  seq: 1

http:
  method: post
  url: http://localhost:8081/v1/agendamentos
  headers:
    - name: Content-Type
      value: application/json
    - name: X-Idempotency-Key
      value: "{{$randomUUID}}"
  body:
    type: json
    data: |-
      {
        "clienteId": "12345678902",
        "chavePixRecebedor": "usuario3@email.com",
        "valor": {{randomValor}} ,
        "frequencia": "MENSAL",
        "dataInicio": "2026-07-23",
        "quantidadeParcelas": 12
      }
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: bru.setVar("randomValor", (Math.random() * 100000).toFixed(2));

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
